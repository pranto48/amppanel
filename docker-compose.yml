version: '3.8'

services:
  amp-panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amp-panel
    restart: unless-stopped
    ports:
      - "${AMP_HTTP_PORT:-8880}:80"
      - "${AMP_HTTPS_PORT:-8443}:443"
    volumes:
      - ./data:/app/data
      - ./sites:/var/www
      - ./backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AMP_DOMAIN=${AMP_DOMAIN:-localhost}
      - AMP_ADMIN_EMAIL=${AMP_ADMIN_EMAIL:-admin_amp@localhost}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - amp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '${AMP_PANEL_CPU_LIMIT:-1.0}'
          memory: ${AMP_PANEL_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '0.25'
          memory: 128M

  postgres:
    image: postgres:16-alpine
    container_name: amp-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=amp
      - POSTGRES_PASSWORD=${DB_PASSWORD:-amp_secure_2024}
      - POSTGRES_DB=amp_panel
    networks:
      - amp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amp -d amp_panel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '${POSTGRES_CPU_LIMIT:-1.0}'
          memory: ${POSTGRES_MEMORY_LIMIT:-1G}
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: amp-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - amp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT:-0.5}'
          memory: ${REDIS_MEMORY_LIMIT:-256M}
        reservations:
          cpus: '0.1'
          memory: 64M

  nginx:
    image: nginx:alpine
    container_name: amp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites:/var/www:ro
    depends_on:
      amp-panel:
        condition: service_healthy
    networks:
      - amp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '${NGINX_CPU_LIMIT:-0.5}'
          memory: ${NGINX_MEMORY_LIMIT:-128M}
        reservations:
          cpus: '0.1'
          memory: 32M

  pg-backup:
    image: postgres:16-alpine
    container_name: amp-pg-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
      - ./scripts/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
      - ./scripts/pg-restore.sh:/usr/local/bin/pg-restore.sh:ro
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=amp
      - PGPASSWORD=${DB_PASSWORD:-amp_secure_2024}
      - PGDATABASE=amp_panel
      - BACKUP_DIR=/backups/postgres
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_RETENTION_WEEKLY=${BACKUP_RETENTION_WEEKLY:-4}
      - BACKUP_RETENTION_MONTHLY=${BACKUP_RETENTION_MONTHLY:-6}
    entrypoint: /bin/sh
    command: >
      -c "chmod +x /usr/local/bin/pg-backup.sh /usr/local/bin/pg-restore.sh &&
          echo '${BACKUP_CRON_SCHEDULE:-0 2 * * *} /usr/local/bin/pg-backup.sh >> /var/log/pg-backup.log 2>&1' > /etc/crontabs/root &&
          crond -f -l 2"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - amp-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  postgres_data:
  redis_data:

networks:
  amp-network:
    driver: bridge
